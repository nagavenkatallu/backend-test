name: Deploy Backend to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to GCE
        run: |
          echo "Setting up SSH..."
          # Write the private key from GitHub Secrets to a file in the runner
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > gcp_ssh_key
          # Set correct, strict permissions required by SSH
          chmod 600 gcp_ssh_key
          
          echo "Fetching VM IP address..."
          IP_ADDRESS=$(gcloud compute instances describe ${{ secrets.GCE_INSTANCE_NAME }} --zone=${{ secrets.GCE_INSTANCE_ZONE }} --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM IP is $IP_ADDRESS"
          
          echo "Copying application to VM..."
          scp -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i gcp_ssh_key \
            ./target/*.jar \
            ci_user@$IP_ADDRESS:~/app.jar
          
          echo "Restarting application on VM..."
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i gcp_ssh_key \
            ci_user@$IP_ADDRESS \
            "pkill -f 'java -jar' || true; nohup java -jar ~/app.jar > ~/app.log 2>&1 &"