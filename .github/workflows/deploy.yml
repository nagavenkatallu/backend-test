name: Deploy Backend to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to GCE
        run: |
          # 1. Create a new SSH key.
          echo "Generating SSH key..."
          ssh-keygen -t rsa -f gcp_ssh_key -N ''
          
          # 2. Format the public key with the username "runner". 
          #    This resolves the "missing <username>" warning from your logs.
          echo "runner:$(cat gcp_ssh_key.pub)" > formatted_gcp_key.pub
          
          # 3. Add this correctly formatted key to the VM's instance metadata.
          echo "Adding formatted SSH key to VM instance metadata..."
          gcloud compute instances add-metadata ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }} \
            --metadata-from-file ssh-keys=formatted_gcp_key.pub
          
          # 4. Get the external IP address of the VM.
          echo "Fetching VM IP address..."
          IP_ADDRESS=$(gcloud compute instances describe ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM IP is $IP_ADDRESS"
          
          # 5. Use the standard Linux 'scp' command to copy the file.
          #    We are now bypassing the gcloud wrapper entirely.
          echo "Copying application to VM using standard scp..."
          scp -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i gcp_ssh_key \
            ./target/*.jar \
            runner@$IP_ADDRESS:~/app.jar
          
          # 6. Use the standard Linux 'ssh' command to restart the application.
          echo "Restarting application on VM using standard ssh..."
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i gcp_ssh_key \
            runner@$IP_ADDRESS \
            "pkill -f 'java -jar' || true; nohup java -jar ~/app.jar > ~/app.log 2>&1 &"