name: Deploy Backend to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to GCE
        run: |
          echo "OS Login is enabled. Using IAM roles for authentication."
          
          echo "Copying application to VM..."
          gcloud compute scp \
            ./target/*.jar \
            ${{ secrets.GCE_INSTANCE_NAME }}:~/app.jar \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }}
          
          echo "Restarting application on VM..."
          gcloud compute ssh ${{ secrets.GCE_INSTANCE_NAME }} --zone=${{ secrets.GCE_INSTANCE_ZONE }} --command="
            pkill -f 'java -jar' || true
            nohup java -jar ~/app.jar > ~/app.log 2>&1 &
          "