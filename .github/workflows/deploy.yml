name: Deploy Backend to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to GCE
        run: |
          # 1. Create a new SSH key inside the GitHub runner. This part is working correctly.
          echo "Generating SSH key..."
          ssh-keygen -t rsa -f gcp_ssh_key -N '' -C "github-actions"
          
          # 2. Add the PUBLIC key to the VM's instance-level metadata. This is also working correctly.
          echo "Adding SSH key to VM instance metadata..."
          gcloud compute instances add-metadata ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }} \
            --metadata-from-file ssh-keys=gcp_ssh_key.pub
          
          # 3. Copy the application, EXPLICITLY telling gcloud to use our new private key.
          echo "Copying application to VM..."
          gcloud compute scp \
            --ssh-key-file=gcp_ssh_key \
            ./target/*.jar \
            ${{ secrets.GCE_INSTANCE_NAME }}:~/app.jar \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }}
          
          # 4. Restart the application, EXPLICITLY telling gcloud to use our new private key.
          echo "Restarting application on VM..."
          gcloud compute ssh \
            --ssh-key-file=gcp_ssh_key \
            ${{ secrets.GCE_INSTANCE_NAME }} --zone=${{ secrets.GCE_INSTANCE_ZONE }} --command="
              pkill -f 'java -jar' || true
              nohup java -jar ~/app.jar > ~/app.log 2>&1 &
            "